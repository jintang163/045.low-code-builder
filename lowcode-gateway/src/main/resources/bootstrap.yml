spring:
  application:
    name: lowcode-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: lowcode
      config:
        server-addr: 127.0.0.1:8848
        namespace: lowcode
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: lowcode-auth
          uri: lb://lowcode-auth
          predicates:
            - Path=/api/auth/**,/api/user/**
        - id: lowcode-model
          uri: lb://lowcode-model
          predicates:
            - Path=/api/model/**,/api/datasource/**,/api/migration/**,/api/relation/**,/api/generator/code/**
        - id: lowcode-page
          uri: lb://lowcode-page
          predicates:
            - Path=/api/page/**,/api/component/**,/api/version/**,/api/custom-component/**,/api/ai/**
        - id: lowcode-flow
          uri: lb://lowcode-flow
          predicates:
            - Path=/api/logic/**,/api/debug/**,/api/workflow/**
        - id: lowcode-oss
          uri: lb://lowcode-oss
          predicates:
            - Path=/api/oss/**
        - id: lowcode-generator
          uri: lb://lowcode-generator
          predicates:
            - Path=/api/app/**,/api/template/**
        - id: lowcode-monitor
          uri: lb://lowcode-monitor
          predicates:
            - Path=/api/monitor/**
          filters:
            - StripPrefix=1
        - id: lowcode-deploy
          uri: lb://lowcode-deploy
          predicates:
            - Path=/api/deploy/**,/ws/deploy/**
          filters:
            - StripPrefix=0
        - id: lowcode-collaboration
          uri: lb://lowcode-collaboration
          predicates:
            - Path=/api/collaboration/**,/ws/collaboration/**
          filters:
            - StripPrefix=0
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: info
    com.lowcode.gateway: debug
